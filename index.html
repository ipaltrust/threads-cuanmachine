<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threads CuanMachine Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', 'Segoe UI', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">
    <div class="max-w-5xl w-full">
        
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-3 tracking-tight">🧵 Threads CuanMachine</h1>
            <p class="text-slate-400 text-lg">Generator AI Funnel & Hook Pemantik Konversi</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-2xl md:col-span-1 h-fit shadow-2xl">
                <h2 class="text-xl font-bold mb-5 border-b border-slate-700 pb-3 flex items-center gap-2">
                    <span>⚙️</span> Parameter Setup
                </h2>
                
                <div class="mb-5">
                    <label class="block text-sm font-medium text-slate-300 mb-2">Siapa Target Audiens Anda?</label>
                    <input type="text" id="targetAudience" placeholder="Misal: Karyawan SCBD usia 25an" class="w-full bg-slate-800/50 border border-slate-600 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-500 text-slate-100">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-300 mb-2">Apa Produk Digital Anda?</label>
                    <input type="text" id="targetProduct" placeholder="Misal: E-book Manajemen Gaji" class="w-full bg-slate-800/50 border border-slate-600 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-500 text-slate-100">
                </div>

                <button onclick="generateContent()" class="w-full bg-gradient-to-r from-blue-600 to-emerald-500 hover:from-blue-500 hover:to-emerald-400 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transform transition-all hover:-translate-y-1 active:scale-95">
                    🚀 Generate Mesin Cuan
                </button>
            </div>

            <div class="glass p-6 rounded-2xl md:col-span-2 min-h-[450px] flex flex-col shadow-2xl transition-all" id="resultArea">
                <div class="flex-grow flex flex-col items-center justify-center text-slate-500 text-center h-full">
                    <svg class="w-16 h-16 mb-4 opacity-40 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    <p class="text-lg">Masukkan parameter di samping dan klik <br><strong class="text-slate-400">"Generate Mesin Cuan"</strong></p>
                    <p class="text-sm mt-2">Sistem akan membedah psikologi audiens Anda secara instan.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateContent() {
            const rawAudience = document.getElementById('targetAudience').value;
            const rawProduct = document.getElementById('targetProduct').value;
            const resultArea = document.getElementById('resultArea');

            if(!rawAudience || !rawProduct) {
                alert("Isi dulu target audiens dan produknya, PakPal!");
                return;
            }

            // GANTI DENGAN URL WEB APP APPS SCRIPT ANDA
            const scriptURL = 'https://script.google.com/macros/s/AKfycbxPFOM9ZMvlC84s-XU4VVqelHpplHBByoPR6ygYrQdQvBN6UhZH3ziyLrhX8Mb3j9g6/exec';

            // Tampilkan animasi loading (Karena AI butuh waktu berpikir sekitar 3-5 detik)
            resultArea.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-blue-400">
                    <svg class="w-12 h-12 mb-4 animate-spin text-emerald-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <p class="text-lg font-semibold animate-pulse">Menghubungkan ke Otak AI Gemini...</p>
                    <p class="text-xs text-slate-500 mt-2">Sedang membedah psikologi audiens</p>
                </div>`;

            // Proses Fetch (Tanpa no-cors agar kita bisa membaca balasan JSON dari Apps Script)
            fetch(scriptURL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, // Pakai text/plain untuk menghindari CORS preflight block
                body: JSON.stringify({ audience: rawAudience, product: rawProduct }),
            })
            .then(response => response.json())
            .then(data => {
                let htmlOutput = `
                    <div class="flex justify-between items-center mb-5 border-b border-slate-700 pb-3">
                        <h2 class="text-2xl font-bold text-emerald-400">🔥 Blueprint Konten Siap Eksekusi</h2>
                        <span class="bg-blue-900/50 text-blue-300 text-xs px-3 py-1 rounded-full border border-blue-700/50">Status: Optimal</span>
                    </div>
                    <div class="space-y-4 overflow-y-auto pr-2" style="max-height: 400px;">
                `;

                // Render 2 Kotak Pain Point Pertama
                for(let i=0; i<2; i++) {
                    let item = data[i];
                    let color = i === 0 ? 'red' : 'yellow';
                    htmlOutput += `
                        <div class="bg-slate-800/40 border border-slate-700 hover:border-blue-500/50 transition-colors p-4 rounded-xl">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-${color}-500/20 text-${color}-400 text-xs px-2 py-0.5 rounded font-bold">${item.type}</span>
                            </div>
                            <p class="text-slate-200 font-medium italic">"${item.teks}"</p>
                        </div>
                    `;
                }

                // Render Kotak ke-3: VIRAL HACK (Daur Ulang Komentar)
                let hack = data[2];
                if(hack && hack.type === "VIRAL_HACK") {
                    htmlOutput += `
                        <div class="bg-gradient-to-r from-emerald-900/30 to-blue-900/30 border border-emerald-700/50 p-4 rounded-xl mt-6 relative overflow-hidden">
                            <div class="absolute top-0 right-0 bg-emerald-500 text-white text-[10px] font-bold px-2 py-1 rounded-bl-lg">VIRAL HACK</div>
                            <h3 class="font-bold text-emerald-400 mb-2 flex items-center gap-2">♻️ Daur Ulang Komentar Nyinyir</h3>
                            <p class="text-sm text-slate-300 mb-3 border-l-2 border-emerald-500 pl-3"><strong>Jika ada yang komentar:</strong> "${hack.nyinyir}"</p>
                            <div class="bg-black/30 p-3 rounded-lg">
                                <p class="text-xs text-slate-400 mb-1">Balas & Quote Post dengan ini:</p>
                                <p class="text-slate-200 text-sm italic">"${hack.balasan}"</p>
                            </div>
                        </div>
                    `;
                }

                htmlOutput += `</div>`;
                resultArea.innerHTML = htmlOutput;
            })
            .catch(error => {
                console.error('Error:', error);
                resultArea.innerHTML = `<div class="text-red-400 text-center mt-10"><b>Gagal Terhubung!</b><br>Pastikan URL Apps Script sudah benar dan jaringan stabil.</div>`;
            });
        }
    </script>
</body>
</html>
